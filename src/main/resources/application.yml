server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONN_TIMEOUT_MS:30000}
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET}
    exp-minutes: ${JWT_EXP_MINUTES:60}
  payments:
    provider: ${PAYMENTS_PROVIDER:stripe}
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
    mail:
      from: ${MAIL_FROM:no-reply@cherrytwins.com}
    security:
      verify-email-exp-minutes: ${VERIFY_EMAIL_EXP_MINUTES:60}
      reset-password-exp-minutes: ${RESET_PASSWORD_EXP_MINUTES:30}