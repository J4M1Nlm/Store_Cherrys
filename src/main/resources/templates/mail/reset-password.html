<!doctype html>
<html lang="es">
<body style="font-family: Arial, sans-serif; background:#f6f6f6; padding:20px;">
<div style="max-width:600px;margin:0 auto;background:#ffffff;border-radius:8px;padding:20px;">
    <h2>Recuperación de contraseña</h2>
    <p>Hola <b th:text="${name}">cliente</b>,</p>
    <p>Para crear una nueva contraseña, haz clic en el botón:</p>

    <p style="margin:24px 0;">
        <a th:href="${resetUrl}"
           style="background:#111827;color:#fff;text-decoration:none;padding:12px 18px;border-radius:6px;display:inline-block;">
            Restablecer contraseña
        </a>
    </p>

    <p style="color:#6b7280;font-size:12px;">
        Este link expira en <span th:text="${minutes}">30</span> minutos.
    </p>
</div>
</body>
</html>
